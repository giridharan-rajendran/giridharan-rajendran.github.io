<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Nunito+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *{ margin:0; padding:0; box-sizing:border-box; }
  html,body{ width:1584px; height:396px; overflow:hidden; background:#0F172A; }

  .banner{
    width:1584px; height:396px;
    background:linear-gradient(135deg,#0F172A 0%,#1E1B4B 40%,#312E81 72%,#1E3A5F 100%);
    display:flex; align-items:center; padding:0 72px;
    font-family:'Nunito Sans',sans-serif;
    position:relative; overflow:hidden;
  }

  /* decorative glow orbs */
  .orb1{position:absolute;top:-120px;right:260px;width:420px;height:420px;border-radius:50%;background:radial-gradient(circle,rgba(99,102,241,0.28) 0%,transparent 68%);pointer-events:none;}
  .orb2{position:absolute;bottom:-160px;right:80px;width:380px;height:380px;border-radius:50%;background:radial-gradient(circle,rgba(56,189,248,0.22) 0%,transparent 68%);pointer-events:none;}
  .orb3{position:absolute;top:-60px;left:340px;width:280px;height:280px;border-radius:50%;background:radial-gradient(circle,rgba(124,58,237,0.2) 0%,transparent 68%);pointer-events:none;}
  .orb4{position:absolute;bottom:-80px;left:200px;width:240px;height:240px;border-radius:50%;background:radial-gradient(circle,rgba(45,212,191,0.15) 0%,transparent 68%);pointer-events:none;}

  /* thin accent line top */
  .accent-line{position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#6366F1,#A78BFA,#38BDF8,#34D399);}

  /* ── LEFT: name + title + tags ── */
  /* shifted right so LinkedIn's bottom-left profile circle (≈180px) doesn't cover it */
  .left{
    padding-left:200px;
    display:flex; flex-direction:column; justify-content:center;
    gap:10px; flex:1; position:relative; z-index:1;
  }

  .name{
    font-family:'Sora',sans-serif; font-weight:800;
    font-size:44px; line-height:1; letter-spacing:-0.025em; color:#fff;
  }
  .name span{
    background:linear-gradient(90deg,#818CF8,#38BDF8,#34D399);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  }

  .title{
    font-family:'Sora',sans-serif; font-weight:600;
    font-size:17px; color:rgba(255,255,255,0.82); letter-spacing:0.01em;
  }

  .tags{ display:flex; gap:7px; flex-wrap:wrap; }
  .tag{
    font-size:11.5px; font-weight:600; padding:4px 13px; border-radius:100px;
    background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.14);
    color:rgba(255,255,255,0.68);
  }

  .url{
    font-family:'Sora',sans-serif; font-size:12.5px; font-weight:600;
    color:#818CF8; letter-spacing:0.03em; margin-top:2px;
  }

  /* ── DIVIDER ── */
  .divider{
    width:1px; height:200px; flex-shrink:0;
    background:linear-gradient(to bottom,transparent,rgba(255,255,255,0.18),transparent);
    margin:0 56px; position:relative; z-index:1;
  }

  /* ── RIGHT: stats grid ── */
  .stats{ display:flex; flex-direction:column; gap:10px; min-width:320px; position:relative; z-index:1; }

  .stat-row{ display:flex; gap:10px; }

  .stat{ flex:1; padding:14px 18px; border-radius:12px; }
  .stat.c1{ background:rgba(99,102,241,0.22);  border:1px solid rgba(99,102,241,0.42); }
  .stat.c2{ background:rgba(13,148,136,0.22);  border:1px solid rgba(13,148,136,0.42); }
  .stat.c3{ background:rgba(234,88,12,0.22);   border:1px solid rgba(234,88,12,0.42); }
  .stat.c4{ background:rgba(124,58,237,0.22);  border:1px solid rgba(124,58,237,0.42); }

  .stat-num{
    font-family:'Sora',sans-serif; font-size:22px; font-weight:800; color:#fff; line-height:1;
  }
  .stat-lbl{
    font-size:9.5px; font-weight:600; color:rgba(255,255,255,0.52);
    text-transform:uppercase; letter-spacing:0.07em; margin-top:4px;
  }
</style>
</head>
<body>
<div class="banner">
  <div class="accent-line"></div>
  <div class="orb1"></div>
  <div class="orb2"></div>
  <div class="orb3"></div>
  <div class="orb4"></div>

  <div class="left">
    <div class="name">Giridharan <span>Rajendran</span></div>
    <div class="title">Senior Engineering Leader &nbsp;·&nbsp; 20 Years</div>
    <div class="tags">
      <span class="tag">AI &amp; Agentic Platforms</span>
      <span class="tag">DevSecOps</span>
      <span class="tag">SRE</span>
      <span class="tag">Cloud Architecture</span>
      <span class="tag">People Leadership</span>
    </div>
    <div class="url">giridharan-rajendran.github.io</div>
  </div>

  <div class="divider"></div>

  <div class="stats">
    <div class="stat-row">
      <div class="stat c1">
        <div class="stat-num">$1.2M+</div>
        <div class="stat-lbl">Annual Cost Savings</div>
      </div>
      <div class="stat c2">
        <div class="stat-num">5×</div>
        <div class="stat-lbl">Deploy Frequency</div>
      </div>
    </div>
    <div class="stat-row">
      <div class="stat c3">
        <div class="stat-num">99.9%</div>
        <div class="stat-lbl">System Uptime</div>
      </div>
      <div class="stat c4">
        <div class="stat-num">800+</div>
        <div class="stat-lbl">Compliance Hrs Saved</div>
      </div>
    </div>
  </div>

</div>
</body>
</html>
